[mcp_servers.black_souls]
type = "stdio"
command = "node"
# Replace C:/path/to/black-souls-mcp with the absolute clone path.
args = ["C:/path/to/black-souls-mcp/dist/index.js"]
startup_timeout_sec = 20

[mcp_servers.black_souls.env]
BLACK_SOULS_ROOT = "C:/path/to/black-souls-mcp/runtime"
BLACK_SOULS_DIR = "C:/path/to/black-souls-mcp/runtime/game"
# Replace this with: (Get-FileHash -Algorithm SHA256 -LiteralPath '.../Game.exe').Hash
BLACK_SOULS_GAME_EXE_SHA256 = "YOUR_GAME_EXE_SHA256"
