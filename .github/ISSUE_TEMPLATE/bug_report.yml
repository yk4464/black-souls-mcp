name: Bug report
description: Report a reproducible MCP, bridge, installer, or runtime problem.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach game files, saves, tokens, Codex configuration, or logs containing personal paths.
  - type: input
    id: version
    attributes:
      label: Project version
      placeholder: 1.1.1
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - MCP server
        - RGSS3 bridge
        - Installation or rollback
        - Runtime preparation
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the expected result and the actual result.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Windows version, Node.js version, and whether the synthetic checks pass.
      placeholder: "Windows 11; Node.js 22; npm run check: pass"
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed game data, save contents, access tokens, and personal paths.
          required: true
